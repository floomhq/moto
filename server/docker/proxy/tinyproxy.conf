# moto — tinyproxy config template.
#
# This file is NOT the one tinyproxy reads at runtime. entrypoint.sh
# substitutes the __UPSTREAM__ placeholder with a real `upstream` directive
# derived from $PROXY_URL, writes the result to /tmp/tinyproxy.conf, and
# execs tinyproxy against that.
#
# We use tinyproxy instead of 3proxy because 3proxy 0.9.4/0.9.5/latest
# silently ignored the `parent` directive with every documented config
# variant we tried (allow→parent, parent→allow, http/connect/connect+
# types, single and multi-listener). Tinyproxy's `upstream` directive
# is short, obvious, and verified working end-to-end.

User tinyproxy
Group tinyproxy

Port 8118
Listen 0.0.0.0

Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"

# Log to stdout so `docker logs moto-proxy` shows activity.
LogLevel Info

# Allow all source IPs — the container only listens on the internal Docker
# bridge (see compose.yaml port mapping 127.0.0.1:8118) so this is scoped
# by the host firewall, not by tinyproxy ACLs.
Allow 0.0.0.0/0

# Tinyproxy adds a Via: header by default — strip it to look less like a
# proxy hop to residential endpoints that sniff for it.
DisableViaHeader Yes

# Upstream residential proxy — substituted at container start.
# Valid forms generated by entrypoint.sh:
#   upstream http USER:PASS@host:port
#   upstream https USER:PASS@host:port
#   upstream socks5 USER:PASS@host:port
#   (empty line if PROXY_URL is unset → direct egress)
__UPSTREAM__
